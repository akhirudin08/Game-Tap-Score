<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Game Gunting Kertas Batu</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            touch-action: manipulation;
            overflow: hidden; 
            background-color: #121212;
            color: white;
        }

        .container {
            display: flex;
            height: 100vh;
            width: 100vw;
            position: relative;
        }

        /* Area Pemain */
        .side {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 40px 10px;
            user-select: none;
            -webkit-user-select: none;
            transition: opacity 0.3s;
        }

        .left { background-color: #e74c3c; }
        .right { background-color: #3498db; }

        /* Status & Skor */
        .header {
            text-align: center;
        }
        
        .player-name {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .score {
            font-size: 5rem;
            font-weight: bold;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.3);
            line-height: 1;
        }

        /* Area Tombol Pilihan (Tata Letak Kolom untuk Potret) */
        .actions {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
            align-items: center;
        }

        .action-btn {
            background: rgba(0, 0, 0, 0.2);
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 15px;
            padding: 15px;
            width: 80px;
            height: 80px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.2s ease;
            color: white;
        }

        .action-btn svg {
            width: 40px;
            height: 40px;
        }

        .action-btn:active {
            transform: scale(0.9);
            background: rgba(0, 0, 0, 0.4);
        }

        /* State ketika tombol sudah dipilih */
        .action-btn.selected {
            border-color: #f1c40f;
            background: rgba(241, 196, 15, 0.4);
            transform: scale(1.1);
            box-shadow: 0 0 15px rgba(241, 196, 15, 0.6);
        }

        /* Banner Pengumuman di Tengah Layar */
        #result-banner {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background-color: #2c3e50;
            color: #f1c40f;
            padding: 20px 40px;
            border-radius: 30px;
            font-size: 2rem;
            font-weight: bold;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.6);
            border: 4px solid #f1c40f;
            z-index: 100;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none; /* Agar klik tembus ke bawah jika nyangkut */
            white-space: nowrap;
        }

        #result-banner.show {
            transform: translate(-50%, -50%) scale(1);
        }

        .reset-global {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 10px 20px;
            background: #222;
            color: white;
            border: 1px solid #555;
            border-radius: 20px;
            font-size: 0.9rem;
            z-index: 50;
            cursor: pointer;
        }

        /* --- CSS TAMBAHAN UNTUK RESPONSIVITAS --- */

        /* Menangani Tata Letak di Lanskap */
        @media (orientation: landscape) {
            .actions {
                flex-direction: row; /* Ikon berjejer horizontal di lanskap */
                gap: 20px; /* Jarak horizontal yang lebih besar agar bagus */
                justify-content: center; /* Pusatkan ikon */
            }

            /* Opsional: Ubah penyelarasan elemen side untuk lanskap agar tidak terlalu renggang vertikal */
            .side {
                justify-content: space-around; /* Lebih seimbang secara vertikal */
            }
        }

        /* Menangani perangkat layar besar (opsional, untuk memastikan horizontal di tablet lanskap) */
        @media (min-width: 800px) {
             .actions {
                flex-direction: row; /* Ikon berjejer horizontal di layar lebar */
                gap: 20px;
                justify-content: center;
            }
        }

    </style>
</head>
<body>

    <div class="container">
        <div class="side left" id="side-left">
            <div class="header">
                <div class="player-name">P1 (KIRI)</div>
                <div class="score" id="score-p1">0</div>
            </div>
            
            <div class="actions">
                <div class="action-btn" data-player="1" data-choice="batu" id="btn-p1-batu">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polygon points="12 2 2 7 2 17 12 22 22 17 22 7 12 2"></polygon>
                    </svg>
                </div>
                <div class="action-btn" data-player="1" data-choice="kertas" id="btn-p1-kertas">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"></path>
                        <polyline points="13 2 13 9 20 9"></polyline>
                    </svg>
                </div>
                <div class="action-btn" data-player="1" data-choice="gunting" id="btn-p1-gunting">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="6" cy="6" r="3"></circle>
                        <circle cx="6" cy="18" r="3"></circle>
                        <line x1="20" y1="4" x2="8.12" y2="15.88"></line>
                        <line x1="14.47" y1="14.48" x2="20" y2="20"></line>
                        <line x1="8.12" y1="8.12" x2="12" y2="12"></line>
                    </svg>
                </div>
            </div>
        </div>

        <div class="side right" id="side-right">
            <div class="header">
                <div class="player-name">P2 (KANAN)</div>
                <div class="score" id="score-p2">0</div>
            </div>
            
            <div class="actions">
                <div class="action-btn" data-player="2" data-choice="batu" id="btn-p2-batu">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polygon points="12 2 2 7 2 17 12 22 22 17 22 7 12 2"></polygon>
                    </svg>
                </div>
                <div class="action-btn" data-player="2" data-choice="kertas" id="btn-p2-kertas">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"></path>
                        <polyline points="13 2 13 9 20 9"></polyline>
                    </svg>
                </div>
                <div class="action-btn" data-player="2" data-choice="gunting" id="btn-p2-gunting">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="6" cy="6" r="3"></circle>
                        <circle cx="6" cy="18" r="3"></circle>
                        <line x1="20" y1="4" x2="8.12" y2="15.88"></line>
                        <line x1="14.47" y1="14.48" x2="20" y2="20"></line>
                        <line x1="8.12" y1="8.12" x2="12" y2="12"></line>
                    </svg>
                </div>
            </div>
        </div>

        <div id="result-banner">Mulai!</div>
    </div>

    <button class="reset-global" id="btn-reset-global">Reset Game</button>

    <script>
        // State Permainan
        let scoreP1 = 0;
        let scoreP2 = 0;
        let choiceP1 = null;
        let choiceP2 = null;
        let isEvaluating = false; // Mencegah klik ganda saat sedang menghitung skor

        // Elemen DOM
        const scoreElP1 = document.getElementById('score-p1');
        const scoreElP2 = document.getElementById('score-p2');
        const resultBanner = document.getElementById('result-banner');
        const allButtons = document.querySelectorAll('.action-btn');

        // Fungsi saat pemain menekan tombol pilihan
        allButtons.forEach(btn => {
            btn.addEventListener('click', function(e) {
                // Jangan lakukan apa-apa jika ronde sedang dievaluasi
                if (isEvaluating) return;

                const player = this.getAttribute('data-player');
                const choice = this.getAttribute('data-choice');

                if (player === '1' && choiceP1 === null) {
                    choiceP1 = choice;
                    this.classList.add('selected');
                } else if (player === '2' && choiceP2 === null) {
                    choiceP2 = choice;
                    this.classList.add('selected');
                }

                // Jika kedua pemain sudah memilih, tentukan pemenang
                if (choiceP1 !== null && choiceP2 !== null) {
                    evaluateRound();
                }
            });
        });

        // Fungsi Menentukan Pemenang
        function evaluateRound() {
            isEvaluating = true;
            let resultText = "";

            // Aturan Gunting Kertas Batu
            if (choiceP1 === choiceP2) {
                resultText = "SERI!";
            } else if (
                (choiceP1 === 'batu' && choiceP2 === 'gunting') ||
                (choiceP1 === 'kertas' && choiceP2 === 'batu') ||
                (choiceP1 === 'gunting' && choiceP2 === 'kertas')
            ) {
                resultText = "P1 MENANG!";
                scoreP1++;
                scoreElP1.textContent = scoreP1;
            } else {
                resultText = "P2 MENANG!";
                scoreP2++;
                scoreElP2.textContent = scoreP2;
            }

            // Tampilkan Banner Hasil
            resultBanner.textContent = resultText;
            resultBanner.classList.add('show');

            // Reset ronde setelah 2 detik
            setTimeout(() => {
                resetRound();
            }, 2000);
        }

        // Fungsi Reset Ronde (Skor tetap, pilihan diulang)
        function resetRound() {
            choiceP1 = null;
            choiceP2 = null;
            isEvaluating = false;
            
            // Sembunyikan banner
            resultBanner.classList.remove('show');
            
            // Hapus efek warna kuning (selected) dari semua tombol
            allButtons.forEach(btn => {
                btn.classList.remove('selected');
            });
        }

        // Fungsi Reset Total Permainan (Kembali ke 0)
        document.getElementById('btn-reset-global').addEventListener('click', () => {
            if(confirm("Yakin ingin mereset skor ke 0?")) {
                scoreP1 = 0;
                scoreP2 = 0;
                scoreElP1.textContent = scoreP1;
                scoreElP2.textContent = scoreP2;
                resetRound();
            }
        });
    </script>
</body>
</html>
